<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Price Tracker</title>

<!-- iOS home-screen app behavior -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Prices" />
<link rel="apple-touch-icon" href="/icon-180.png" />
<link rel="icon" href="/favicon.png" />
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#201D1A" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --paper: #FAF7F0;
    --ink: #201D1A;
    --muted: #8C877A;
    --hairline: #D8D2C4;
    --drop: #2F6F4E;
    --gold: #C08A28;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 3rem;
  }

  .wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 1.1rem;
  }

  header.top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5rem 0 1rem;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .brand svg { width: 26px; height: 26px; flex-shrink: 0; }

  .brand h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 1.35rem;
    margin: 0;
    letter-spacing: -0.01em;
  }

  button {
    font-family: inherit;
    cursor: pointer;
    border: none;
  }

  .ghost-btn {
    background: none;
    color: var(--muted);
    font-size: 0.85rem;
    padding: 0.4rem 0.2rem;
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  /* ---- Login screen ---- */
  #login-screen {
    text-align: center;
    padding: 3.5rem 0 2rem;
  }
  #login-screen p {
    color: var(--muted);
    font-size: 0.95rem;
    max-width: 40ch;
    margin: 0.8rem auto 2rem;
    line-height: 1.5;
  }
  .google-btn {
    background: var(--ink);
    color: var(--paper);
    font-size: 0.95rem;
    font-weight: 500;
    padding: 0.85rem 1.6rem;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
  }

  /* ---- Notification banner ---- */
  #notif-banner {
    display: none;
    background: #F1ECDF;
    border: 1px solid var(--hairline);
    border-radius: 12px;
    padding: 0.85rem 1rem;
    margin-bottom: 1.2rem;
    font-size: 0.85rem;
    color: var(--ink);
  }
  #notif-banner button {
    background: var(--ink);
    color: var(--paper);
    font-size: 0.8rem;
    padding: 0.45rem 0.9rem;
    border-radius: 999px;
    margin-top: 0.6rem;
  }

  /* ---- Search ---- */
  .search-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.4rem;
  }
  .search-row input {
    flex: 1;
    font-family: inherit;
    font-size: 0.95rem;
    padding: 0.8rem 1rem;
    border-radius: 12px;
    border: 1px solid var(--hairline);
    background: white;
    color: var(--ink);
  }
  .search-row input:focus { outline: 2px solid var(--ink); outline-offset: 1px; }
  .search-row button {
    background: var(--ink);
    color: var(--paper);
    padding: 0 1.2rem;
    border-radius: 12px;
    font-size: 0.9rem;
    font-weight: 500;
  }
  .search-row button:disabled { opacity: 0.5; }

  section.block { margin-bottom: 2.2rem; }

  .block h2 {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 0 0 0.8rem;
  }

  .tear {
    border: none;
    border-top: 1.5px dashed var(--hairline);
    margin: 2rem 0;
  }

  /* ---- Product card ---- */
  .product-card {
    background: white;
    border: 1px solid var(--hairline);
    border-radius: 14px;
    padding: 1rem 1.1rem;
    margin-bottom: 0.9rem;
  }
  .product-card .head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 0.6rem;
    margin-bottom: 0.7rem;
  }
  .product-card .query {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 1.02rem;
    line-height: 1.3;
  }
  .product-card .meta {
    color: var(--muted);
    font-size: 0.75rem;
    margin-top: 0.15rem;
  }
  .icon-btn {
    background: none;
    color: var(--muted);
    font-size: 0.78rem;
    padding: 0.3rem 0.5rem;
    white-space: nowrap;
  }
  .icon-btn.remove:hover { color: #B3452B; }
  .icon-btn.save { color: var(--ink); font-weight: 500; }

  .site-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 0;
    border-top: 1px solid #F1EDE3;
  }
  .site-row:first-of-type { border-top: none; }
  .site-row .site-name {
    font-size: 0.88rem;
    color: var(--ink);
  }
  .site-row .price-cell {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .site-row .price {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 0.92rem;
    font-variant-numeric: tabular-nums;
  }
  .site-row.cheapest .price { color: var(--drop); }
  .badge {
    font-size: 0.62rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid var(--gold);
    border-radius: 999px;
    padding: 0.1rem 0.45rem;
  }
  .site-row .price.error { color: var(--muted); font-family: 'Inter'; font-size: 0.8rem; font-weight: 400; }
  .site-row a { color: inherit; text-decoration: none; }
  .site-row a:hover .site-name { text-decoration: underline; }

  .empty {
    color: var(--muted);
    font-size: 0.88rem;
    padding: 1.5rem 0;
    text-align: center;
  }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--hairline);
    border-top-color: var(--ink);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #app-screen { display: none; }
</style>
</head>
<body>

<div class="wrap">

  <header class="top">
    <div class="brand">
      <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M 210 60 L 380 155 L 380 260 L 210 460 L 55 260 Z" fill="#C08A28"/>
        <circle cx="160" cy="180" r="26" fill="#FAF7F0"/>
      </svg>
      <h1>Price Tracker</h1>
    </div>
    <button id="logout-btn" class="ghost-btn" style="display:none;">Sign out</button>
  </header>

  <!-- Logged out -->
  <div id="login-screen">
    <p>Search a product, compare its price across your sites, and get notified the moment it drops.</p>
    <button id="login-btn" class="google-btn">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#fff" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.9c1.7-1.56 2.7-3.87 2.7-6.62z"/><path fill="#fff" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.9v2.33A9 9 0 0 0 9 18z"/><path fill="#fff" d="M3.95 10.7A5.4 5.4 0 0 1 3.67 9c0-.59.1-1.17.28-1.7V4.97H.9A9 9 0 0 0 0 9c0 1.45.35 2.83.9 4.03l3.05-2.33z"/><path fill="#fff" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .9 4.97l3.05 2.33C4.66 5.17 6.65 3.58 9 3.58z"/></svg>
      Sign in with Google
    </button>
  </div>

  <!-- Logged in -->
  <div id="app-screen">

    <div id="notif-banner"></div>

    <div class="search-row">
      <input id="search-input" type="text" placeholder="Search a product…" autocomplete="off" />
      <button id="search-btn">Search</button>
    </div>

    <section class="block" id="results-block" style="display:none;">
      <h2>Results</h2>
      <div id="results-list"></div>
    </section>

    <hr class="tear" />

    <section class="block">
      <h2>Bookmarked</h2>
      <div id="bookmarks-list"><div class="empty">Nothing bookmarked yet — search above and tap Save.</div></div>
    </section>

  </div>

</div>

<script src="firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging-compat.js"></script>
<script src="app.js"></script>
</body>
</html>
